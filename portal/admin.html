<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Desk Admin | CarbonXFuture</title>
<link rel="icon" href="/favicon.ico" sizes="48x48"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--forest:#1A4A2E;--forest-light:#2D6B45;--forest-pale:#EAF2EC;--slate-50:#F5F5F3;--slate-100:#E8E8E4;--slate-200:#C8C8C2;--slate-400:#8A8A82;--slate-600:#4A4A45;--slate-800:#1E1E1A;--amber:#B8740A;--amber-pale:#FDF3E3;}
body{font-family:'Inter',sans-serif;color:var(--slate-800);font-size:14px;line-height:1.6;background:var(--slate-50);min-height:100vh;}
.topbar{background:var(--slate-800);padding:12px 1.5rem;display:flex;justify-content:space-between;align-items:center;}
.topbar .brand{color:#fff;font-size:13px;font-weight:500;text-decoration:none;}
.topbar button{background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
.wrap{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;margin-bottom:1.5rem;}
h2{font-size:1rem;font-weight:600;margin-bottom:0.75rem;}
.card{background:#fff;border:0.5px solid var(--slate-100);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px;}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--slate-400);padding:8px 10px;border-bottom:1px solid var(--slate-100);}
td{padding:9px 10px;border-bottom:0.5px solid var(--slate-100);vertical-align:middle;}
.pill{font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:100px;text-transform:uppercase;}
.pill.pending,.pill.submitted{background:var(--amber-pale);color:var(--amber);}
.pill.approved,.pill.validated,.pill.published{background:var(--forest-pale);color:var(--forest);}
.pill.sold,.pill.won{background:var(--forest);color:#fff;}
.pill.new{background:var(--amber-pale);color:var(--amber);}
.pill.rejected,.pill.suspended{background:#FBEAEA;color:#A33;}
button.act{border:none;border-radius:7px;padding:6px 13px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin:2px;}
.ok{background:var(--forest);color:#fff;}
.warn{background:var(--amber-pale);color:var(--amber);}
.bad{background:#FBEAEA;color:#A33;}
.ghost{background:var(--slate-100);color:var(--slate-600);}
.muted{color:var(--slate-400);font-size:12px;}
a{color:var(--forest-light);}
.denied{max-width:480px;margin:5rem auto;text-align:center;}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/">⬡ CarbonXFuture · Desk Admin</a>
  <div><a href="/" style="color:#fff;font-size:12px;margin-right:12px;">← Website</a><button onclick="signOut()">Sign out</button></div>
</div>
<div class="wrap" id="app"><p class="muted" style="text-align:center;margin-top:4rem;">Loading…</p></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/portal/config.js"></script>
<script>
const db = supabase.createClient(CXF_SUPABASE_URL, CXF_SUPABASE_KEY);
let USER = null;
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function signOut(){ await db.auth.signOut(); location.href='/portal/'; }
async function audit(action, target){ try { await db.from('audit_log').insert({actor: USER.email, action, target}); } catch(e){} }

async function notifyMember(type, to, data) {
  try {
    const { data: s } = await db.auth.getSession();
    const res = await fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + s.session.access_token },
      body: JSON.stringify({ type, to, data })
    });
    if (!res.ok) throw new Error((await res.json()).error || ('HTTP ' + res.status));
    return true;
  } catch (e) {
    alert('Action saved, but the notification email failed (' + e.message + ') — please email the member manually from desk@carbonxfuture.com.');
    return false;
  }
}

(async function init(){
  const { data } = await db.auth.getSession();
  if (!data.session) { location.href = '/portal/'; return; }
  USER = data.session.user;
  if (!CXF_ADMIN_EMAILS.includes(USER.email.toLowerCase())) {
    document.getElementById('app').innerHTML = '<div class="denied"><h1>Not authorized</h1><p class="muted">This area is reserved for the CarbonXFuture desk.</p></div>';
    return;
  }
  document.getElementById('app').innerHTML = `
    <h1>Desk Admin</h1>
    <div class="card"><h2>RFQ desk — quote requests</h2><div id="rfqs" class="muted">Loading…</div></div>
    <div class="card"><h2>Members</h2><div id="members" class="muted">Loading…</div></div>
    <div class="card"><h2>Reports awaiting validation</h2><div id="reports" class="muted">Loading…</div></div>
    <div class="card"><h2>Documents</h2><div id="docs" class="muted">Loading…</div></div>
    <div class="card"><h2>Published listings</h2><div id="listings" class="muted">Loading…</div></div>
    <div class="card"><h2>Retirement certificates</h2>
      <p class="muted" style="margin-bottom:0.75rem;">Issue a numbered certificate when credits are retired for a buyer. Serials are public and verifiable at /verify.html — never put private data in these fields.</p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">
        <input id="ctBuyer" placeholder="Retired for (e.g. Acme Corp — or 'Confidential')" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="ctProject" placeholder="Project (e.g. World Trade Petroleum — Re-Refinery)" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="ctVolume" type="number" min="1" placeholder="Volume (tCO₂e)" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="ctVintage" placeholder="Vintage (e.g. 2026)" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="ctDate" type="date" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="ctEmail" type="email" placeholder="Buyer email for the certificate (optional)" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
      </div>
      <button class="act ok" onclick="issueCertificate()">Issue certificate</button>
      <div id="certs" class="muted" style="margin-top:1rem;">Loading…</div>
    </div>
    <div class="card"><h2>Public projects — website Project Explorer</h2>
      <p class="muted" style="margin-bottom:0.75rem;">Publish a validated member project to the public Project Explorer page (shown with the ⬡ CXF badge).</p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">
        <select id="pjMember" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"><option value="">— member (optional) —</option></select>
        <input id="pjName" placeholder="Project name" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="pjCountry" placeholder="Country / State" value="Florida, USA" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="pjType" placeholder="Type" value="Waste oil re-refining" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="pjVintages" placeholder="Vintages (e.g. 2027–2036)" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="pjSize" placeholder="Indicative size (e.g. ~425k tCO₂e/yr, pre-operational)" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="pjAnnual" type="number" min="0" placeholder="Annual volume (tCO₂e/yr, e.g. 425000)" oninput="pjCalc()" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="pjPrice" type="number" min="0" step="0.01" placeholder="Indicative price ($/tCO₂e, e.g. 21.50)" oninput="pjCalc()" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
        <input id="pjYears" type="number" min="1" max="30" placeholder="Term (years, e.g. 10)" oninput="pjCalc()" style="padding:8px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;"/>
      </div>
      <p class="muted" style="margin-bottom:8px;">Total project value: <b id="pjTotal" style="color:var(--forest);">—</b> <span id="pjTotalDetail"></span> · leave the three value fields empty if you don't want the project shown in the marketplace.</p>
      <button class="act ok" onclick="publishProject()">Publish to website</button>
      <div id="cxfprojects" class="muted" style="margin-top:1rem;">Loading…</div>
    </div>
    <div class="card"><h2>Backup</h2>
      <p class="muted" style="margin-bottom:0.75rem;">Downloads every table (members, reports, listings, RFQs, certificates, price history, subscribers, audit log) as one JSON file. Keep weekly copies in a safe folder. <span id="bkReminder" style="color:var(--amber);font-weight:600;"></span></p>
      <button class="act ok" id="bkBtn" onclick="downloadBackup()">Download full backup (JSON)</button>
      <span id="bkStatus" class="muted" style="margin-left:10px;"></span>
      <p class="muted" style="margin-top:0.5rem;">Note: uploaded PDF files live in Supabase Storage and are not inside this JSON — download important documents from the Documents card.</p>
    </div>
    <div class="card"><h2>Newsletter — Desk Note</h2>
      <p class="muted" style="margin-bottom:0.75rem;">Subscribers: <b id="nlCount">…</b> · sends individually via Resend (recipients never see each other).</p>
      <input id="nlSubject" placeholder="Subject (e.g. Desk Note — July 13, 2026)" style="width:100%;padding:9px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;margin-bottom:8px;"/>
      <textarea id="nlBody" rows="10" placeholder="Paste the newsletter text here (blank line = new paragraph)…" style="width:100%;padding:9px;border:0.5px solid var(--slate-200);border-radius:7px;font-family:'Inter',sans-serif;font-size:12.5px;margin-bottom:8px;resize:vertical;"></textarea>
      <button class="act ok" id="nlBtn" onclick="sendNewsletter()">Send to all subscribers</button>
      <span id="nlStatus" class="muted" style="margin-left:10px;"></span>
    </div>`;
  loadMembers(); loadReports(); loadDocs(); loadListings(); loadCxfProjects(); loadSubscriberCount();
  loadRfqs(); loadCertificates(); capturePriceSnapshot(); backupReminder();
})();

/* ---------- Backup ---------- */
const BK_TABLES = ['members','reports','documents','listings','cxf_projects','rfqs','certificates','price_history','newsletter_subscribers','audit_log'];
function backupReminder(){
  const last = localStorage.getItem('cxf_last_backup');
  const days = last ? Math.floor((Date.now() - Number(last)) / 86400000) : null;
  const el = document.getElementById('bkReminder');
  if (days === null) el.textContent = '⚠ No backup recorded yet on this device — download one now.';
  else if (days >= 7) el.textContent = '⚠ Last backup was ' + days + ' days ago — time for a fresh one.';
  else el.textContent = '';
}
async function downloadBackup(){
  const btn = document.getElementById('bkBtn'), st = document.getElementById('bkStatus');
  btn.disabled = true; st.textContent = 'Exporting…';
  try {
    const backup = { exported_at: new Date().toISOString(), exported_by: USER.email, tables: {} };
    for (const t of BK_TABLES) {
      const { data, error } = await db.from(t).select('*').limit(10000);
      backup.tables[t] = error ? { error: error.message } : data;
      st.textContent = 'Exporting… ' + t + ' (' + (Array.isArray(backup.tables[t]) ? backup.tables[t].length : '!') + ')';
    }
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'cxf-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click(); URL.revokeObjectURL(a.href);
    localStorage.setItem('cxf_last_backup', String(Date.now()));
    backupReminder();
    const counts = BK_TABLES.map(t => t + ':' + (Array.isArray(backup.tables[t]) ? backup.tables[t].length : 'ERR')).join(' · ');
    st.textContent = '✓ Saved to Downloads — ' + counts;
    audit('backup_downloaded', counts);
  } catch(e) { st.textContent = ''; alert('Backup failed: ' + e.message); }
  btn.disabled = false;
}

/* ---------- Price index snapshot (auto-archive on every admin visit) ---------- */
async function capturePriceSnapshot(){
  try {
    const p = await (await fetch('/prices.json', {cache:'no-store'})).json();
    if (!p || !p.lastUpdated || !p.prices) return;
    const { data } = await db.from('price_history').select('date').eq('date', p.lastUpdated).maybeSingle();
    if (!data) { await db.from('price_history').insert({ date: p.lastUpdated, prices: p.prices }); }
  } catch(e) {}
}

/* ---------- RFQ desk ---------- */
async function loadRfqs(){
  const el = document.getElementById('rfqs');
  const { data, error } = await db.from('rfqs').select('*').neq('status','archived').order('created_at',{ascending:false}).limit(100);
  if (error) { el.textContent = 'Error: ' + error.message + ' — did you run schema-market-suite.sql?'; return; }
  if (!data.length) { el.textContent = 'No open quote requests.'; return; }
  el.innerHTML = `<table><tr><th>Received</th><th>Listing</th><th>Volume</th><th>Target</th><th>Company / Contact</th><th>Status</th><th>Actions</th></tr>` +
    data.map(q => `<tr>
      <td class="muted">${new Date(q.created_at).toLocaleDateString('en-US')}</td>
      <td><b>${esc(q.listing_name)}</b>${q.notes ? '<div class="muted">' + esc(q.notes) + '</div>' : ''}</td>
      <td>${q.volume_tco2e ? Number(q.volume_tco2e).toLocaleString() : '—'}</td>
      <td>${q.target_price ? '$' + Number(q.target_price).toFixed(2) : '—'}</td>
      <td>${esc(q.company)}<div class="muted">${esc(q.contact_name)} · <a href="mailto:${esc(q.email)}">${esc(q.email)}</a>${q.timeframe ? ' · ' + esc(q.timeframe) : ''}</div></td>
      <td><span class="pill ${q.status === 'new' ? 'pending' : q.status === 'quoted' ? 'approved' : q.status === 'won' ? 'validated' : 'rejected'}">${esc(q.status)}</span>${q.quote_price ? '<div class="muted">quoted $' + Number(q.quote_price).toFixed(2) + '</div>' : ''}</td>
      <td>
        ${q.status === 'new' || q.status === 'quoted' ? `<button class="act ok" onclick="quoteRfq('${q.id}')">Send quote</button>` : ''}
        ${q.status === 'quoted' ? `<button class="act warn" onclick="setRfqStatus('${q.id}','won')">Won</button><button class="act bad" onclick="setRfqStatus('${q.id}','lost')">Lost</button>` : ''}
        <button class="act ghost" onclick="setRfqStatus('${q.id}','archived')">Archive</button>
      </td></tr>`).join('') + '</table>';
}
async function quoteRfq(id){
  const { data: q } = await db.from('rfqs').select('*').eq('id', id).maybeSingle();
  if (!q) return;
  const price = prompt('Indicative price for "' + q.listing_name + '" ($/tCO₂e):', q.target_price || '');
  if (price === null || !parseFloat(price)) return;
  const notes = prompt('Optional note to include in the quote email:', '') || '';
  const { error } = await db.from('rfqs').update({ status: 'quoted', quote_price: parseFloat(price), quote_notes: notes, quoted_at: new Date().toISOString() }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  await notifyMember('rfq_quote', q.email, {
    name: q.contact_name, company: q.company, listing: q.listing_name,
    volume: q.volume_tco2e ? Number(q.volume_tco2e).toLocaleString('en-US') : '',
    price: parseFloat(price).toFixed(2), notes
  });
  audit('rfq_quoted', q.listing_name + ' @ $' + price + ' → ' + q.email);
  loadRfqs();
}
async function setRfqStatus(id, status){
  const { error } = await db.from('rfqs').update({ status }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('rfq_' + status, id); loadRfqs();
}

/* ---------- Retirement certificates ---------- */
async function nextSerial(){
  const year = new Date().getFullYear();
  const { data } = await db.from('certificates').select('serial').like('serial', 'CXF-' + year + '-%').order('serial',{ascending:false}).limit(1);
  const last = data && data[0] ? parseInt(data[0].serial.split('-')[2]) || 0 : 0;
  return 'CXF-' + year + '-' + String(last + 1).padStart(4, '0');
}
async function issueCertificate(){
  const buyer_display = document.getElementById('ctBuyer').value.trim();
  const project_name = document.getElementById('ctProject').value.trim();
  const volume_tco2e = parseFloat(document.getElementById('ctVolume').value);
  const vintage = document.getElementById('ctVintage').value.trim();
  const retirement_date = document.getElementById('ctDate').value || new Date().toISOString().slice(0,10);
  const buyerEmail = document.getElementById('ctEmail').value.trim();
  if (!buyer_display || !project_name || !volume_tco2e || volume_tco2e <= 0) return alert('Please fill in buyer, project and a valid volume.');
  const serial = await nextSerial();
  if (!confirm('Issue certificate ' + serial + ' — ' + volume_tco2e.toLocaleString() + ' tCO₂e retired for "' + buyer_display + '"?')) return;
  let { error } = await db.from('certificates').insert({ serial, buyer_display, project_name, volume_tco2e, vintage, retirement_date });
  if (error && /load failed|failed to fetch|network/i.test(error.message)) {
    await new Promise(r => setTimeout(r, 1200));
    ({ error } = await db.from('certificates').insert({ serial, buyer_display, project_name, volume_tco2e, vintage, retirement_date }));
  }
  if (error) return alert('Error: ' + error.message + (error.message.includes('certificates') ? ' — did you run schema-market-suite.sql?' : ''));
  audit('certificate_issued', serial + ' · ' + volume_tco2e + ' tCO₂e · ' + buyer_display);
  if (buyerEmail) {
    await notifyMember('certificate_issued', buyerEmail, { name: buyer_display, serial, project: project_name, volume: volume_tco2e.toLocaleString('en-US') });
  }
  ['ctBuyer','ctProject','ctVolume','ctVintage','ctEmail'].forEach(i => document.getElementById(i).value = '');
  alert('Issued ' + serial + ' — printable at /certificate.html?serial=' + serial);
  loadCertificates();
}
async function loadCertificates(){
  const el = document.getElementById('certs');
  const { data, error } = await db.from('certificates').select('*').order('created_at',{ascending:false}).limit(50);
  if (error) { el.textContent = 'Error: ' + error.message + ' — did you run schema-market-suite.sql?'; return; }
  if (!data.length) { el.textContent = 'No certificates issued yet.'; return; }
  el.innerHTML = `<table><tr><th>Serial</th><th>Retired for</th><th>Project</th><th>Volume</th><th>Date</th><th>Status</th><th></th></tr>` +
    data.map(c => `<tr>
      <td><b>${esc(c.serial)}</b></td><td>${esc(c.buyer_display)}</td><td>${esc(c.project_name)}</td>
      <td>${Number(c.volume_tco2e).toLocaleString()}</td><td>${esc(c.retirement_date)}</td>
      <td><span class="pill ${c.status === 'active' ? 'validated' : 'rejected'}">${esc(c.status)}</span></td>
      <td><a href="/certificate.html?serial=${encodeURIComponent(c.serial)}" target="_blank">Open</a>
          ${c.status === 'active' ? ` <button class="act bad" onclick="revokeCertificate('${c.id}','${esc(c.serial)}')">Revoke</button>` : ''}</td>
    </tr>`).join('') + '</table>';
}
async function revokeCertificate(id, serial){
  if (!confirm('Revoke certificate ' + serial + '? It will show as REVOKED on public verification.')) return;
  const { error } = await db.from('certificates').update({ status: 'revoked' }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('certificate_revoked', serial); loadCertificates();
}

/* ---------- Members ---------- */
async function loadMembers(){
  const { data, error } = await db.from('members').select('*').order('created_at',{ascending:false});
  const el = document.getElementById('members');
  if (error) { el.textContent = 'Error: ' + error.message; return; }
  if (!data.length) { el.textContent = 'No members yet.'; return; }
  el.innerHTML = `<table><tr><th>Company</th><th>Contact</th><th>Email</th><th>Type</th><th>Status</th><th>Actions</th></tr>` +
    data.map(m => `<tr>
      <td><b>${esc(m.company)}</b></td><td>${esc(m.contact_name)}</td><td>${esc(m.email)}</td>
      <td>${esc(m.member_type ?? '—')}</td>
      <td><span class="pill ${esc(m.status)}">${esc(m.status)}</span></td>
      <td>${m.status !== 'approved' ? `<button class="act ok" onclick="setStatus('${m.id}','approved')">Approve</button>` : ''}
          ${m.status !== 'rejected' ? `<button class="act bad" onclick="setStatus('${m.id}','rejected')">Reject</button>` : ''}
          ${m.status === 'approved' ? `<button class="act ghost" onclick="setStatus('${m.id}','suspended')">Suspend</button>` : ''}</td>
    </tr>`).join('') + '</table>';
}
async function setStatus(id, status){
  if (!confirm('Set member status to "' + status + '"?')) return;
  const { data: m } = await db.from('members').select('email, contact_name, company').eq('id', id).single();
  const { error } = await db.from('members').update({ status }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('member_status:' + status, id);
  let sent = null;
  if (m && status === 'approved') sent = await notifyMember('member_approved', m.email, { name: m.contact_name, company: m.company });
  if (m && status === 'rejected') sent = await notifyMember('member_rejected', m.email, { name: m.contact_name, company: m.company });
  if (sent) alert('Done — the member has been notified by email.');
  loadMembers();
}

/* ---------- Reports & validation → auto-listing ---------- */
async function loadReports(){
  const { data, error } = await db.from('reports').select('*, members(company, member_type)').order('created_at',{ascending:false});
  const el = document.getElementById('reports');
  if (error) { el.textContent = 'Error: ' + error.message; return; }
  if (!data.length) { el.textContent = 'No reports yet.'; return; }
  el.innerHTML = `<table><tr><th>Member</th><th>Period</th><th>Activity</th><th>Litres</th><th>tCO₂e</th><th>Evidence</th><th>Status</th><th>Actions</th></tr>` +
    data.map(r => `<tr>
      <td><b>${esc(r.members?.company)}</b></td><td>${esc(r.period)}</td>
      <td>${esc(CXF_FACTORS[r.activity]?.label || r.activity)}</td>
      <td>${Number(r.litres).toLocaleString()}</td><td><b>${r.computed_tco2e}</b></td>
      <td>${r.evidence_path ? `<a href="#" onclick="openFile('${esc(r.evidence_path)}');return false;">View</a>` : '<span class="muted">none</span>'}</td>
      <td><span class="pill ${esc(r.status)}">${esc(r.status.replace('_',' '))}</span></td>
      <td>${r.status === 'submitted' ? `
        <button class="act ok" onclick="validateReport('${r.id}')">Validate → list</button>
        <button class="act warn" onclick="requestChanges('${r.id}')">Changes</button>
        <button class="act bad" onclick="rejectReport('${r.id}')">Reject</button>` : ''}</td>
    </tr>`).join('') + '</table>';
}

async function validateReport(id){
  const { data: r, error: e1 } = await db.from('reports').select('*, members(company, email, contact_name)').eq('id', id).single();
  if (e1) return alert('Error: ' + e1.message);
  const priceStr = prompt('Validate ' + r.computed_tco2e + ' tCO₂e for "' + r.members.company + '".\nIndicative ask price per tCO₂e in USD (leave empty for "on request"):');
  if (priceStr === null) return;
  const price = priceStr.trim() === '' ? null : parseFloat(priceStr);
  const { error: e2 } = await db.from('reports').update({ status: 'validated' }).eq('id', id);
  if (e2) return alert('Error: ' + e2.message);
  const { error: e3 } = await db.from('listings').insert({
    member_id: r.member_id, report_id: r.id,
    name: r.members.company + ' — ' + (CXF_FACTORS[r.activity]?.label || r.activity),
    vintage: r.period.slice(0,4), volume: r.computed_tco2e, price,
    type: 'Waste oil'
  });
  if (e3) return alert('Report validated but listing failed: ' + e3.message);
  audit('validate_report+list', id);
  const sent = await notifyMember('report_validated', r.members.email, {
    name: r.members.contact_name, company: r.members.company,
    period: r.period, volume: r.computed_tco2e, price: price ? price.toFixed(2) : null
  });
  alert('Validated and published to the marketplace.' + (sent ? ' The member has been notified by email.' : ''));
  loadReports(); loadListings();
}
async function requestChanges(id){
  const note = prompt('What should the member fix / add?');
  if (note === null) return;
  const { data: r } = await db.from('reports').select('period, members(email, contact_name, company)').eq('id', id).single();
  const { error } = await db.from('reports').update({ status: 'changes_requested', admin_notes: note }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('report_changes_requested', id);
  if (r) await notifyMember('report_changes', r.members.email, { name: r.members.contact_name, company: r.members.company, period: r.period, note });
  loadReports();
}
async function rejectReport(id){
  const note = prompt('Rejection reason (visible to the member):');
  if (note === null) return;
  const { data: r } = await db.from('reports').select('period, members(email, contact_name, company)').eq('id', id).single();
  const { error } = await db.from('reports').update({ status: 'rejected', admin_notes: note }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('report_rejected', id);
  if (r) await notifyMember('report_rejected', r.members.email, { name: r.members.contact_name, company: r.members.company, period: r.period, note });
  loadReports();
}

/* ---------- Documents ---------- */
async function loadDocs(){
  const { data, error } = await db.from('documents').select('*, members(company)').order('uploaded_at',{ascending:false});
  const el = document.getElementById('docs');
  if (error) { el.textContent = 'Error: ' + error.message; return; }
  if (!data.length) { el.textContent = 'No documents yet.'; return; }
  el.innerHTML = `<table><tr><th>Member</th><th>Type</th><th>File</th><th>Status</th><th>Actions</th></tr>` +
    data.map(d => `<tr>
      <td><b>${esc(d.members?.company)}</b></td><td>${esc(d.doc_type)}</td>
      <td><a href="#" onclick="openFile('${esc(d.storage_path)}');return false;">${esc(d.file_name)}</a></td>
      <td><span class="pill ${esc(d.status)}">${esc(d.status.replace('_',' '))}</span></td>
      <td>${d.status === 'submitted' ? `
        <button class="act ok" onclick="setDoc('${d.id}','validated')">Validate</button>
        <button class="act bad" onclick="setDoc('${d.id}','rejected')">Reject</button>` : ''}</td>
    </tr>`).join('') + '</table>';
}
async function setDoc(id, status){
  const { error } = await db.from('documents').update({ status }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('document_' + status, id); loadDocs();
}
async function openFile(path){
  const { data, error } = await db.storage.from('member-docs').createSignedUrl(path, 300);
  if (error) return alert('Error: ' + error.message);
  window.open(data.signedUrl, '_blank');
}

/* ---------- Listings ---------- */
async function loadListings(){
  const { data, error } = await db.from('listings').select('*, members(company)').order('validated_at',{ascending:false});
  const el = document.getElementById('listings');
  if (error) { el.textContent = 'Error: ' + error.message; return; }
  if (!data.length) { el.textContent = 'No listings yet — validate a report to publish the first one.'; return; }
  el.innerHTML = `<table><tr><th>Listing</th><th>Member</th><th>Vintage</th><th>Volume</th><th>Price</th><th>Status</th><th>Actions</th></tr>` +
    data.map(l => `<tr>
      <td><b>${esc(l.name)}</b></td><td>${esc(l.members?.company ?? '—')}</td>
      <td>${esc(l.vintage)}</td><td>${Number(l.volume).toLocaleString()} tCO₂e</td>
      <td>${l.price ? '$' + Number(l.price).toFixed(2) : 'on request'}</td>
      <td><span class="pill ${esc(l.status)}">${esc(l.status)}</span></td>
      <td>${l.status === 'published' ? `<button class="act ok" onclick="markSold('${l.id}')">Mark sold</button><button class="act ghost" onclick="withdrawListing('${l.id}')">Withdraw</button>` : ''}</td>
    </tr>`).join('') + '</table>';
}
async function markSold(id){
  if (!confirm('Mark this listing as SOLD? It leaves the public marketplace and shows as sold in the member portfolio.')) return;
  const { error } = await db.from('listings').update({ status: 'sold' }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('listing_sold', id); loadListings();
}
/* ---------- Public projects (website showcase) ---------- */
async function loadCxfProjects(){
  const el = document.getElementById('cxfprojects');
  const { data: members } = await db.from('members').select('id, company').eq('status','approved');
  const sel = document.getElementById('pjMember');
  if (members && sel.options.length <= 1) members.forEach(m => { const o = document.createElement('option'); o.value = m.id; o.textContent = m.company; sel.appendChild(o); });
  const { data, error } = await db.from('cxf_projects').select('*, members(company)').order('created_at',{ascending:false});
  if (error) { el.textContent = 'Error: ' + error.message + ' — did you run schema-projects.sql in Supabase?'; return; }
  if (!data.length) { el.textContent = 'No public projects yet.'; return; }
  el.innerHTML = `<table><tr><th>Project</th><th>Member</th><th>Country</th><th>Type</th><th>Vintages</th><th>Size</th><th>Total value</th><th>Status</th><th></th></tr>` +
    data.map(p => { const tv = (p.annual_tco2e && p.price_usd && p.term_years) ? p.annual_tco2e * p.price_usd * p.term_years : null; return `<tr>
      <td><b>${esc(p.name)}</b></td><td>${esc(p.members?.company ?? '—')}</td><td>${esc(p.country)}</td>
      <td>${esc(p.type)}</td><td>${esc(p.vintages)}</td><td>${esc(p.size)}</td>
      <td>${tv ? '<b>$' + tv.toLocaleString('en-US',{maximumFractionDigits:0}) + '</b>' : '—'}</td>
      <td><span class="pill ${esc(p.status)}">${esc(p.status)}</span></td>
      <td>${p.status === 'published' ? `<button class="act ghost" onclick="withdrawProject('${p.id}')">Withdraw</button>` : ''}</td>
    </tr>`;}).join('') + '</table>';
}
function pjCalc(){
  const a = parseFloat(document.getElementById('pjAnnual').value) || 0;
  const p = parseFloat(document.getElementById('pjPrice').value) || 0;
  const y = parseInt(document.getElementById('pjYears').value) || 0;
  const total = a * p * y;
  document.getElementById('pjTotal').textContent = total > 0 ? '$' + total.toLocaleString('en-US', {maximumFractionDigits:0}) : '—';
  document.getElementById('pjTotalDetail').textContent = total > 0 ? `(${a.toLocaleString()} tCO₂e/yr × $${p} × ${y} yr = ${(a*y).toLocaleString()} tCO₂e total)` : '';
}

async function publishProject(){
  const name = document.getElementById('pjName').value.trim();
  if (!name) return alert('Please enter the project name.');
  const member_id = document.getElementById('pjMember').value || null;
  const country = document.getElementById('pjCountry').value.trim() || 'USA';
  const type = document.getElementById('pjType').value.trim() || 'Waste oil re-refining';
  const vintages = document.getElementById('pjVintages').value.trim();
  const size = document.getElementById('pjSize').value.trim();
  const annual_tco2e = parseFloat(document.getElementById('pjAnnual').value) || null;
  const price_usd = parseFloat(document.getElementById('pjPrice').value) || null;
  const term_years = parseInt(document.getElementById('pjYears').value) || null;
  const row = { member_id, name, country, type, vintages, size, annual_tco2e, price_usd, term_years };
  let { error } = await db.from('cxf_projects').insert(row);
  // Transient network failure (Safari "Load failed" / Chrome "Failed to fetch")
  // on the first request after idle — wait a moment and retry once automatically.
  if (error && /load failed|failed to fetch|network/i.test(error.message)) {
    await new Promise(r => setTimeout(r, 1200));
    ({ error } = await db.from('cxf_projects').insert(row));
  }
  if (error) return alert('Error: ' + error.message + (error.message.includes('annual_tco2e') ? ' — did you run schema-project-value.sql in Supabase?' : ''));
  audit('project_published', name);
  const totalValue = (annual_tco2e && price_usd && term_years) ? annual_tco2e * price_usd * term_years : null;
  // Email the member that their project is live
  if (member_id) {
    const { data: m } = await db.from('members').select('email, contact_name').eq('id', member_id).maybeSingle();
    if (m?.email) {
      await notifyMember('project_published', m.email, {
        name: m.contact_name, project: name,
        details: [type, country, vintages && ('Vintages ' + vintages), size,
          totalValue && ('Indicative total project value $' + totalValue.toLocaleString('en-US',{maximumFractionDigits:0}))].filter(Boolean).join(' · ')
      });
    }
  }
  document.getElementById('pjName').value = ''; document.getElementById('pjVintages').value = ''; document.getElementById('pjSize').value = '';
  document.getElementById('pjAnnual').value = ''; document.getElementById('pjPrice').value = ''; document.getElementById('pjYears').value = ''; pjCalc();
  alert('Published — live on the Project Explorer page' + (totalValue ? ' and in the marketplace as a forward offer.' : '.'));
  loadCxfProjects();
}
async function withdrawProject(id){
  if (!confirm('Withdraw this project from the public website?')) return;
  const { error } = await db.from('cxf_projects').update({ status: 'withdrawn' }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('project_withdrawn', id); loadCxfProjects();
}

/* ---------- Newsletter ---------- */
async function loadSubscriberCount(){
  const { count, error } = await db.from('newsletter_subscribers').select('*', { count: 'exact', head: true }).eq('status','active');
  document.getElementById('nlCount').textContent = error ? '— (run schema-newsletter.sql?)' : count;
}
async function sendNewsletter(){
  const subject = document.getElementById('nlSubject').value.trim();
  const body = document.getElementById('nlBody').value.trim();
  const btn = document.getElementById('nlBtn');
  const st = document.getElementById('nlStatus');
  if (!subject || !body) return alert('Please fill in the subject and the newsletter text.');
  if (!confirm('Send this newsletter to ALL active subscribers now?')) return;
  btn.disabled = true; st.textContent = 'Sending…';
  try {
    const { data: s } = await db.auth.getSession();
    const res = await fetch('/api/newsletter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + s.session.access_token },
      body: JSON.stringify({ subject, body })
    });
    const out = await res.json();
    if (!res.ok) throw new Error(out.error || ('HTTP ' + res.status));
    st.textContent = `✓ Sent to ${out.sent}/${out.total} subscribers` + (out.failed?.length ? ` — failed: ${out.failed.join(', ')}` : '');
    audit('newsletter_sent', subject + ' → ' + out.sent + ' subscribers');
  } catch(e) { st.textContent = ''; alert('Send failed: ' + e.message); }
  btn.disabled = false;
}

async function withdrawListing(id){
  if (!confirm('Withdraw this listing from the marketplace?')) return;
  const { error } = await db.from('listings').update({ status: 'withdrawn' }).eq('id', id);
  if (error) return alert('Error: ' + error.message);
  audit('listing_withdrawn', id); loadListings();
}
